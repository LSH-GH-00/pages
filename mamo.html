<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>파일 저장/불러오기</title>

<style>

body{
    margin:10px;
    font-family:sans-serif;
}

table{
    width:100%;
}

td{
    padding:3px;
}

button{
    padding:8px 12px;
}

#제목{
    width:100%;
    box-sizing:border-box;
    padding:8px;
}

#내용{
    width:100%;
    height:80vh;
    box-sizing:border-box;
    padding:10px;
    resize:none;
    font-family:monospace;
}

</style>
</head>

<body>

<table>

<tr>

<td>
<button onclick="download()">저장</button>
</td>

<td>
<button id="버튼">불러오기</button>
<input type="file" id="picker" style="display:none">
</td>

<td width="100%">
<input type="text" id="제목" placeholder="파일 제목">
</td>

</tr>

<tr>

<td colspan="3">
<textarea id="내용" placeholder="파일 내용"></textarea>
</td>

</tr>

</table>

<script>

// 파일 선택 버튼 클릭
document.getElementById('버튼').addEventListener('click', function () {
    document.getElementById('picker').click();
});

// 파일 읽기
document.getElementById('picker').addEventListener('change', function (e) {

    const 파일 = e.target.files[0];

    if (!파일) return;

    const 읽기도구 = new FileReader();

    읽기도구.readAsText(파일, "UTF-8");

    읽기도구.onload = function () {
        document.getElementById("제목").value = 파일.name;
        document.getElementById("내용").value = 읽기도구.result;
    };
});

// 파일 저장
function download() {

    let 내용 = document.getElementById("내용").value;
    let 제목 = document.getElementById("제목").value;

    if (!제목) {
        제목 = "내파일";
    }

    // UTF-8 BOM
    const blob = new Blob(
        ["\uFEFF" + 내용],
        { type: "text/plain;charset=utf-8" }
    );

    const 링크 = document.createElement("a");

    링크.href = URL.createObjectURL(blob);
    링크.download = 제목;

    document.body.appendChild(링크);
    링크.click();
    document.body.removeChild(링크);

    // 메모리 정리
    setTimeout(() => {
        URL.revokeObjectURL(링크.href);
    }, 1000);
}

</script>

</body>
</html>
